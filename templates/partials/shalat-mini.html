{{define "shalat-mini"}}
<div class="bg-white dark:bg-[#122E38] border border-[#E2D9CE] dark:border-[#1E4458] rounded-2xl p-5 shadow-card-rest">
    <div class="flex items-center justify-between mb-4">
        <span class="text-xs font-semibold text-[#0E5C73] uppercase tracking-wide">Waktu Shalat — Jakarta</span>
        <a href="/shalat" class="flex items-center gap-1 text-xs font-semibold text-[#5C7A84] dark:text-[#7AAAB5] hover:text-[#0E5C73] transition-colors arrow-slide">
            Lihat semua
            <svg class="w-3 h-3" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </a>
    </div>
    {{if .Error}}
    <p class="text-sm text-center text-[#5C7A84] dark:text-[#7AAAB5] py-2">{{.Error}}</p>
    {{else}}
    <div class="flex gap-2">
        {{range .Prayers}}
        <div class="flex-1 rounded-xl px-2 py-3 text-center transition-all relative {{if .IsNext}}bg-[#0E5C73] shadow-[0_4px_12px_rgba(14,92,115,0.25)]{{else}}bg-[#F3EEE8] dark:bg-[#0F2530]{{end}} {{if .IsPast}}opacity-40{{end}}"
             {{if .IsNext}}style="background: linear-gradient(180deg, #0E5C73 0%, #0A4A5C 100%)"{{end}}>
            <div class="text-[11px] font-semibold mb-1 {{if .IsNext}}text-white/70{{else}}text-[#8AACB5]{{end}}">{{.Name}}</div>
            <div class="text-sm font-bold tabular-nums {{if .IsNext}}text-[#FAF7F2]{{else}}text-[#1A2E35] dark:text-[#EEE8DF]{{end}}">{{.Time}}</div>
        </div>
        {{end}}
    </div>
    {{end}}
</div>
{{end}}
