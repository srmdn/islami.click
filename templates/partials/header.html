{{define "header"}}
<header class="sticky top-0 z-50 bg-[#FAF7F2]/90 dark:bg-[#0B1120]/90 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-700/50">
    <nav class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2.5 group">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[#14B8A6] to-[#0D9488] flex items-center justify-center shadow-md shadow-teal-500/20">
                <svg class="w-5 h-5 text-white" viewBox="0 0 32 32" fill="none">
                    <g transform="translate(16,16)">
                        <rect x="-5" y="-5" width="10" height="10" rx="1" fill="currentColor" opacity="0.9"/>
                        <rect x="-5" y="-5" width="10" height="10" rx="1" fill="currentColor" opacity="0.9" transform="rotate(45)"/>
                    </g>
                    <circle cx="16" cy="16" r="2.5" fill="#0B1120"/>
                </svg>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-800 dark:text-white group-hover:text-[#14B8A6] transition-colors">islami.click</span>
        </a>
        <div class="flex items-center gap-2">
            <a href="/almatsurat" class="relative px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-[#14B8A6] dark:hover:text-[#14B8A6] transition-all">Al-Ma'tsurat</a>
            <a href="/doa" class="relative px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-[#14B8A6] dark:hover:text-[#14B8A6] transition-all">Doa</a>
            <a href="/shalat" class="relative px-3 py-1.5 text-sm font-medium text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-[#14B8A6] dark:hover:text-[#14B8A6] transition-all">Shalat</a>
            <button id="themeToggle" class="ml-2 w-9 h-9 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-[#14B8A6]/10 transition-colors cursor-pointer">
                <svg id="sunIcon" class="w-4.5 h-4.5 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
                </svg>
                <svg id="moonIcon" class="w-4.5 h-4.5 text-slate-300 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>
    <script>
    (function() {
        var btn = document.getElementById('themeToggle');
        var sun = document.getElementById('sunIcon');
        var moon = document.getElementById('moonIcon');
        if (!btn || !sun || !moon) return;
        function updateIcon() {
            var isDark = document.documentElement.classList.contains('dark');
            sun.classList.toggle('hidden', isDark);
            moon.classList.toggle('hidden', !isDark);
        }
        updateIcon();
        btn.addEventListener('click', function() {
            var isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateIcon();
        });
    })();
    </script>
</header>
{{end}}
