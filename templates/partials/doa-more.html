{{define "doa-more"}}
{{range .Items}}
<article
    data-source="{{.SourceType}}"
    data-ruqyah="{{if .IsRuqyah}}true{{else}}false{{end}}"
    data-title="{{.Title}}"
    data-latin="{{.Latin}}"
    data-translation="{{.Translation}}"
    x-show="matches($el)"
    x-transition:enter="transition-opacity duration-150"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-100"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="rounded-2xl border border-slate-200/80 dark:border-slate-700/50 overflow-hidden bg-white dark:bg-slate-800 shadow-sm">

    <button @click="toggle('{{js .ID}}')"
            class="w-full px-5 py-4 flex items-center justify-between gap-3 text-left hover:bg-slate-50/80 dark:hover:bg-slate-700/30 transition-colors">
        <div class="flex items-center gap-3 min-w-0">
            <h3 class="font-semibold text-slate-800 dark:text-slate-100 truncate">{{.Title}}</h3>
            {{if eq .SourceType "quran"}}
            <span class="shrink-0 text-[10px] font-semibold px-2 py-0.5 rounded-md bg-amber-50 dark:bg-amber-950/30 border border-amber-100 dark:border-amber-900/40 text-amber-700 dark:text-amber-400">Al-Qur'an</span>
            {{else if eq .SourceType "hadith"}}
            <span class="shrink-0 text-[10px] font-semibold px-2 py-0.5 rounded-md bg-teal-50 dark:bg-teal-950/30 border border-teal-100 dark:border-teal-900/40 text-teal-700 dark:text-teal-400">Hadits</span>
            {{else if .IsRuqyah}}
            <span class="shrink-0 text-[10px] font-semibold px-2 py-0.5 rounded-md bg-purple-50 dark:bg-purple-950/30 border border-purple-100 dark:border-purple-900/40 text-purple-700 dark:text-purple-400">Ruqyah</span>
            {{end}}
        </div>
        <svg class="shrink-0 w-4 h-4 text-slate-400 transition-transform duration-200"
             :class="isOpen('{{js .ID}}') ? 'rotate-180' : ''"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

     <div x-show="isOpen('{{js .ID}}')"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-1"
         class="border-t border-slate-200 dark:border-slate-700 p-5 sm:p-6">

        <div class="arabic text-3xl leading-[2.4] text-slate-800 dark:text-slate-100 text-right" dir="rtl">{{.Arabic}}</div>

        {{if .Latin}}
        <div class="mt-5 rounded-xl bg-slate-50 dark:bg-slate-900/30 border border-slate-100 dark:border-slate-700/50 px-4 py-3">
            <div class="text-xs font-semibold uppercase tracking-wide text-slate-400 dark:text-slate-500 mb-1">Latin</div>
            <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-300 italic">{{.Latin}}</p>
        </div>
        {{end}}

        <div class="mt-4 text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{.Translation}}</div>

        <div class="mt-5 pt-4 border-t border-dashed border-slate-200 dark:border-slate-700 space-y-2">
            {{if .Source}}
            <p class="text-xs text-slate-500 dark:text-slate-400">
                <span class="font-semibold text-slate-600 dark:text-slate-300">Rujukan:</span>
                {{.Source}}
            </p>
            {{end}}
            {{if .Verification}}
            <p class="text-xs text-emerald-700 dark:text-emerald-400">
                <span class="font-semibold">Verifikasi:</span>
                {{.Verification}}
            </p>
            {{end}}
            {{if .SourceURL}}
            <a href="{{.SourceURL}}" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-1 text-xs font-semibold text-[#0E5C73] dark:text-teal-400 hover:underline">
                Lihat sumber
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
            </a>
            {{end}}
        </div>
    </div>
</article>
{{end}}

{{if .HasMore}}
<div id="doa-load-more"
     class="pt-2">
    <button hx-get="/doa/more?page={{.NextPage}}"
            hx-target="#doa-load-more"
            hx-swap="outerHTML"
            hx-indicator="#doa-load-more"
            class="w-full py-3 rounded-2xl border border-dashed border-slate-300 dark:border-slate-600 text-sm font-medium text-slate-500 dark:text-slate-400 hover:border-[#0E5C73] hover:text-[#0E5C73] dark:hover:border-teal-500 dark:hover:text-teal-400 transition-colors">
        <span class="htmx-indicator">
            <svg class="inline w-4 h-4 animate-spin mr-1" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
        </span>
        Muat lagi
    </button>
</div>
{{end}}
{{end}}
