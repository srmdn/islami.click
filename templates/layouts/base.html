{{define "base"}}
<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} | islami.click</title>
    <meta name="description" content="{{template "description" .}}">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/out.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    {{block "head" .}}{{end}}
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 dark:bg-[#0B1120] text-slate-800 dark:text-white min-h-screen antialiased flex flex-col font-sans transition-colors duration-300">
    {{template "header" .}}

    <main class="flex-1">
        {{template "content" .}}
    </main>

    {{template "footer" .}}

    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/alpine.min.js" defer></script>
    {{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
