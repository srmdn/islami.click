{{define "title"}}{{.Title}}{{end}}
{{define "description"}}{{.Description}}{{end}}

{{define "content"}}
<div class="max-w-3xl mx-auto px-4 py-8">
    <nav class="text-sm text-stone-500 dark:text-stone-400 mb-6">
        <a href="/" class="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Beranda</a>
        <span class="mx-2">/</span>
        <a href="/almatsurat" class="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Al-Ma'tsurat</a>
        <span class="mx-2">/</span>
        <span class="text-stone-800 dark:text-stone-200">Sugro</span>
    </nav>

    <div class="mb-8">
        <h1 class="text-2xl font-bold mb-2">{{.Title}}</h1>
        <p class="text-stone-500 dark:text-stone-400">{{.Description}}</p>
    </div>

    <div class="space-y-4" x-data="{counts: JSON.parse(localStorage.getItem('sugro-counts') || '{}')}">
        {{range .Sections}}
        <div class="bg-white dark:bg-stone-900 rounded-2xl border border-stone-200/80 dark:border-stone-800/80 overflow-hidden"
             x-data="{
                get count() { return parseInt($root.counts['{{.ID}}'] || 0) },
                target: {{.Repeat}},
                tap() {
                    if (this.count < this.target) {
                        $root.counts['{{.ID}}'] = this.count + 1;
                        localStorage.setItem('sugro-counts', JSON.stringify($root.counts));
                    }
                },
                get done() { return this.count >= this.target }
             }">
            <div class="h-1 bg-stone-100 dark:bg-stone-800">
                <div class="h-full bg-gradient-to-r from-emerald-500 to-teal-500 transition-all duration-300" :style="'width:' + Math.min(100, (count/target)*100) + '%'"></div>
            </div>
            <div class="p-6 cursor-pointer select-none" @click="tap()">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-medium text-emerald-700 dark:text-emerald-400">{{.Title}}</h3>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-medium px-2 py-0.5 rounded-full transition-colors"
                              :class="done ? 'bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-400' : 'bg-stone-100 dark:bg-stone-800 text-stone-500'"
                              x-text="done ? 'Selesai' : count + '/{{.Repeat}}'"></span>
                    </div>
                </div>
                <div class="arabic text-2xl leading-[2.2] mb-4 text-stone-900 dark:text-stone-50">{{.Arabic}}</div>
                <div class="text-sm text-stone-600 dark:text-stone-300 leading-relaxed">{{.Translation}}</div>
                {{if .Source}}<div class="text-xs text-stone-400 dark:text-stone-500 mt-3">{{.Source}}</div>{{end}}
            </div>
        </div>
        {{end}}
    </div>
</div>
{{end}}
