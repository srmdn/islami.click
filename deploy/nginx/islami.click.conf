server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /static/ {
        alias /opt/YOUR_APP_DIR/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
